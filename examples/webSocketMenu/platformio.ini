; Web menu example: oneMenu::WebSocketOut/WebSocketDisplay (push-based menu
; output, JSON) + WebOut/WebDisplay (HTTP+xml-stylesheet-PI route, XML, real
; ESP32 and ESP8266 hardware verified) + oneMenu::translateCmd (shorthand-
; command dispatch) + xreef/SimpleFTPServer (edit data/ over the LAN without
; reflashing). Upload data/ via "pio run -e <env> -t uploadfs" before
; flashing/running.
[env:lolin32]
board = lolin32
platform = espressif32
framework = arduino
build_flags =
	-std=gnu++17
	; SimpleFTPServer (xreef) config: its own FtpServerKey.h defaults ESP32 to
	; SD-card storage, but this project mounts SPIFFS (main.cpp). The
	; symbolic names (NETWORK_ESP32, STORAGE_SPIFFS) are defined INSIDE that
	; header, so a #define before #include can't reach them — has to be a
	; compiler -D instead (numeric literals below, from FtpServerKey.h).
	; Both macros must be set together: the header's #ifndef guard checks
	; only the network-type macro, and skips (leaving storage type alone)
	; only if that's already externally defined.
	-DDEFAULT_FTP_SERVER_NETWORK_TYPE_ESP32=6  ; NETWORK_ESP32
	-DDEFAULT_STORAGE_TYPE_ESP32=6              ; STORAGE_SPIFFS
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=gnu++11
	-std=gnu++14
lib_deps =
	HAPI      = https://github.com/InternetOfPins/HAPI.git
	OneData   = https://github.com/InternetOfPins/OneData.git
	OneOutput = https://github.com/InternetOfPins/OneOutput.git
	OneItem   = https://github.com/InternetOfPins/OneItem.git
	OneMenu   = https://github.com/InternetOfPins/OneMenu.git
	links2004/WebSockets
	xreef/SimpleFTPServer

; Wemos D1 Mini clone, ESP8266, 4MB flash
[env:d1_mini]
board = d1_mini
platform = espressif8266
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_flags =
	-std=gnu++17
	; SimpleFTPServer (xreef) config: same override as lolin32's own build_
	; flags comment, ESP8266 side (its own default there is LittleFS, not
	; the SPIFFS this project mounts).
	-DDEFAULT_FTP_SERVER_NETWORK_TYPE_ESP8266=2  ; NETWORK_ESP8266
	-DDEFAULT_STORAGE_TYPE_ESP8266=6              ; STORAGE_SPIFFS
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=gnu++11
	-std=gnu++14
lib_deps =
	HAPI      = https://github.com/InternetOfPins/HAPI.git
	OneData   = https://github.com/InternetOfPins/OneData.git
	OneOutput = https://github.com/InternetOfPins/OneOutput.git
	OneItem   = https://github.com/InternetOfPins/OneItem.git
	OneMenu   = https://github.com/InternetOfPins/OneMenu.git
	links2004/WebSockets
	xreef/SimpleFTPServer
