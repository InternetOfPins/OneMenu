[env:lolin32]
board = lolin32
platform = espressif32
framework = arduino
board_build.partitions = huge_app.csv
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
build_flags =
	-std=gnu++17
	-DCORE_DEBUG_LEVEL=5
build_unflags =
	-std=gnu++11
lib_extra_dirs = ../../..

[env:feather_nrf52832]
board = adafruit_feather_nrf52832
platform = nordicnrf52
framework = arduino
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
build_flags =
	-std=gnu++17
build_unflags =
	-std=gnu++11
lib_extra_dirs = ../../..

; Physical board is a RedBearLab BLE Nano 2 (nRF52832), but PlatformIO's own
; redbear_blenano2 board.json has no "bsp: adafruit" entry, so it resolves to the
; plain framework-arduinonordicnrf5 core (no Bluefruit52Lib -- same limitation as
; the nRF51 Nano 1.5, see project_redbear_nrf51 memory). board=adafruit_feather_nrf52832
; pulls in the Adafruit BSP/Bluefruit52Lib instead -- same chip+softdevice, just
; wrong LED_BUILTIN/pin-name variant (cosmetic only, doesn't block BLE bring-up).
; This unit's onboard interface is mbed DAPLink (0d28:0204), same as Nano 1.5 --
; cmsis-dap upload + /dev/ttyACM0, not the stock Feather's nrfutil/ttyUSB0 path.
[env:redbear_blenano2]
board = adafruit_feather_nrf52832
platform = nordicnrf52
framework = arduino
upload_protocol = cmsis-dap
debug_tool = cmsis-dap
monitor_port = /dev/ttyACM0
monitor_speed = 115200
build_flags =
	-std=gnu++17
build_unflags =
	-std=gnu++11
lib_extra_dirs = ../../..

[env:feather_nrf52840]
board = adafruit_feather_nrf52840
platform = nordicnrf52
framework = arduino
upload_protocol = jlink
debug_tool = jlink
monitor_port = /dev/ttyACM1
monitor_speed = 115200
build_flags =
	-std=gnu++17
build_unflags =
	-std=gnu++11
lib_extra_dirs = ../../..
