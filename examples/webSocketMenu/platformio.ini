; Web menu example: oneMenu::WebSocketOut/WebSocketDisplay (push-based menu
; output) + WebOut/WebDisplay (HTTP+xml-stylesheet-PI route) +
; oneMenu::translateCmd (shorthand-command dispatch). Upload data/ via
; "pio run -t uploadfs" before flashing/running. ESP32 (lolin32) only for
; now, real-hardware verified — ESP8266 (d1_mini) is a disclosed gap: it
; fails to build, a delay(uint32_t) vs delay(unsigned long) overload clash
; between OneChip's own clock.h and the ESP8266 Arduino core, unrelated to
; this example; webOut.h's HTTP+XSLT route also hardcodes ESP32's own
; <WebServer.h> class name regardless.
[env:lolin32]
board = lolin32
platform = espressif32
framework = arduino
build_flags =
	-std=gnu++17
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=gnu++11
	-std=gnu++14
lib_deps =
	HAPI      = https://github.com/InternetOfPins/HAPI.git
	OneData   = https://github.com/InternetOfPins/OneData.git
	OneOutput = https://github.com/InternetOfPins/OneOutput.git
	OneItem   = https://github.com/InternetOfPins/OneItem.git
	OneMenu   = https://github.com/InternetOfPins/OneMenu.git
	links2004/WebSockets
