[env:native]
platform = native
build_flags =
	-g
	-std=c++17
	-Wno-comment
	-fno-pretty-templates
debug_build_flags = -O0 -ggdb3 -g3 -no-pie
	-Wno-comment
	-fno-pretty-templates
lib_deps =
	HAPI      = symlink://../../../../IOP/HAPI
	OneBit    = symlink://../../../../IOP/OneBit
	OnePin    = symlink://../../../../IOP/OnePin
	OneBus    = symlink://../../../../IOP/OneBus
	OneChip   = symlink://../../../../IOP/OneChip
	OneData   = symlink://../../../../IOP/OneData
	OneOutput = symlink://../../../../IOP/OneOutput
	OneItem   = symlink://../../../../IOP/OneItem
	OneParse  = symlink://../../../../IOP/OneParse
	OneMenu   = symlink://../../../../IOP/OneMenu

[env:uno]
board = uno
platform = atmelavr
framework = arduino
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
build_flags =
	-std=c++17
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=c++2a
	-std=gnu++11
	-std=gnu++14
	-std=gnu++20
	-std=gnu++2a
	-std=gnu++1z
lib_deps =
	HAPI      = symlink://../../../../IOP/HAPI
	OneBit    = symlink://../../../../IOP/OneBit
	OnePin    = symlink://../../../../IOP/OnePin
	OneBus    = symlink://../../../../IOP/OneBus
	OneChip   = symlink://../../../../IOP/OneChip
	OneData   = symlink://../../../../IOP/OneData
	OneOutput = symlink://../../../../IOP/OneOutput
	OneItem   = symlink://../../../../IOP/OneItem
	OneParse  = symlink://../../../../IOP/OneParse
	OneMenu   = symlink://../../../../IOP/OneMenu
	https://github.com/neu-rah/streamFlow.git

[env:pico]
board = rpipico
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
monitor_speed = 115200
build_flags =
	-std=gnu++17
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=gnu++11
	-std=gnu++14
lib_deps =
	HAPI      = symlink://../../../../IOP/HAPI
	OneBit    = symlink://../../../../IOP/OneBit
	OnePin    = symlink://../../../../IOP/OnePin
	OneBus    = symlink://../../../../IOP/OneBus
	OneChip   = symlink://../../../../IOP/OneChip
	OneData   = symlink://../../../../IOP/OneData
	OneOutput = symlink://../../../../IOP/OneOutput
	OneItem   = symlink://../../../../IOP/OneItem
	OneParse  = symlink://../../../../IOP/OneParse
	OneMenu   = symlink://../../../../IOP/OneMenu
	https://github.com/neu-rah/tinyTimeUtils.git@^1.1.6

