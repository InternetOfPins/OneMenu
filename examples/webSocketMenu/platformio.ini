; Web menu example: oneMenu::WebSocketOut/WebSocketDisplay (push-based menu
; output) + WebOut/WebDisplay (HTTP+xml-stylesheet-PI route, real ESP32 and
; ESP8266 hardware verified) + oneMenu::translateCmd (shorthand-command
; dispatch). Upload data/ via "pio run -e <env> -t uploadfs" before
; flashing/running.
[env:lolin32]
board = lolin32
platform = espressif32
framework = arduino
build_flags =
	-std=gnu++17
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=gnu++11
	-std=gnu++14
lib_deps =
	HAPI      = https://github.com/InternetOfPins/HAPI.git
	OneData   = https://github.com/InternetOfPins/OneData.git
	OneOutput = https://github.com/InternetOfPins/OneOutput.git
	OneItem   = https://github.com/InternetOfPins/OneItem.git
	OneMenu   = https://github.com/InternetOfPins/OneMenu.git
	links2004/WebSockets

; Wemos D1 Mini clone, ESP8266, 4MB flash
[env:d1_mini]
board = d1_mini
platform = espressif8266
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_flags =
	-std=gnu++17
build_unflags =
	-std=c++11
	-std=c++14
	-std=c++20
	-std=gnu++11
	-std=gnu++14
lib_deps =
	HAPI      = https://github.com/InternetOfPins/HAPI.git
	OneData   = https://github.com/InternetOfPins/OneData.git
	OneOutput = https://github.com/InternetOfPins/OneOutput.git
	OneItem   = https://github.com/InternetOfPins/OneItem.git
	OneMenu   = https://github.com/InternetOfPins/OneMenu.git
	links2004/WebSockets
