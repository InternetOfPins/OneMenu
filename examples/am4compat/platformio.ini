[env:native]
platform = native
build_flags =
	-g
	-std=c++17
	-Wno-comment
	-fno-pretty-templates
debug_build_flags = -O0 -ggdb3 -g3 -no-pie
	-Wno-comment
	-fno-pretty-templates
lib_deps =
	HAPI      = https://github.com/InternetOfPins/HAPI.git@a7e32cb11fefa80e99174e8ccb9b571bac62f6e1
